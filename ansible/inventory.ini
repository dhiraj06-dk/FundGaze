[linux_servers]
linux-prod ansible_host=172.17.86.44 ansible_user=deploy ansible_ssh_private_key_file=~/.ssh/id_rsa

[windows_servers]
windows-prod ansible_host=172.17.86.182 ansible_user=deployuser ansible_password=YourWindowsPassword ansible_connection=winrm ansible_winrm_transport=ntlm ansible_winrm_server_cert_validation=ignore ansible_port=5985

[all:vars]
ansible_python_interpreter=/usr/bin/python3
