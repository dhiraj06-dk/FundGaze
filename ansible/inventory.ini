[linux]
linux1 ansible_host=172.17.86.44

[linux:vars]
ansible_user=deploy
ansible_python_interpreter=/usr/bin/python3

[windows]
winserver ansible_host=172.17.86.182

[windows:vars]
ansible_user=deployuser
ansible_connection=winrm
ansible_winrm_transport=basic
ansible_winrm_server_cert_validation=ignore
ansible_port=5985

[docker_test_server]
dockerserver ansible_host=172.17.86.45

[docker_test_server:vars]
ansible_user=deploy
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=~/.ssh/docker_server_key