---
# ================================================================
# Playbook: Deploy FundGaze to Linux
# Includes: app deployment + HTTPS reverse proxy (Nginx, self-signed)
# ================================================================

- name: Deploy FundGaze to Linux
  hosts: linux
  become: yes

  vars:
    app_name: fundgaze
    app_dir: /opt/fundgaze
    app_port: 8080
    mongo_port: 27017
    secret_key: "{{ secret_key | default('change_this_secret') }}"
    dockerhub_user: "{{ dockerhub_user | default('') }}"
    dockerhub_pass: "{{ dockerhub_pass | default('') }}"
    cert_dir: /etc/nginx/certs

  tasks:

    # ----------------------------------------------------------
    # 1. MONGODB SETUP (Docker container on this server)
    # ----------------------------------------------------------
    - name: Check if Docker is installed
      command: docker --version
      register: docker_check
      failed_when: false
      changed_when: false

    - name: Install Docker CE (RHEL/CentOS/Rocky)
      block:
        - name: Add Docker CE repo
          command: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
          args:
            creates: /etc/yum.repos.d/docker-ce.repo

        - name: Install Docker CE packages
          dnf:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
            state: present
            allowerasing: yes

        - name: Start and enable Docker service
          service:
            name: docker
            state: started
            enabled: yes
      when: docker_check.rc != 0

    - name: Docker Hub login (avoids pull rate limits)
      command: docker login -u "{{ dockerhub_user }}" -p "{{ dockerhub_pass }}"
      when: dockerhub_user != '' and dockerhub_pass != ''
      no_log: true

    - name: Pull MongoDB 7.0 image
      command: docker pull mongo:7.0
      changed_when: false

    - name: Docker Hub logout
      command: docker logout
      when: dockerhub_user != '' and dockerhub_pass != ''
      failed_when: false
      changed_when: false

    - name: Check if MongoDB container already exists
      command: docker inspect fundgaze-mongodb
      register: mongo_check
      failed_when: false
      changed_when: false

    - name: Create and run MongoDB container (first time)
      command: >
        docker run -d
        --name fundgaze-mongodb
        --restart unless-stopped
        -p {{ mongo_port }}:27017
        -v fundgaze_mongo_data:/data/db
        mongo:7.0
      when: mongo_check.rc != 0

    - name: Start MongoDB container (if already exists but stopped)
      command: docker start fundgaze-mongodb
      when: mongo_check.rc == 0
      failed_when: false
      changed_when: false

    - name: Wait for MongoDB to be ready
      wait_for:
        host: 127.0.0.1
        port: "{{ mongo_port }}"
        timeout: 60

    - name: Open MongoDB port 27017 in firewall (for Windows server)
      shell: firewall-cmd --permanent --add-port={{ mongo_port }}/tcp
      failed_when: false
      changed_when: false

    - name: Reload firewall to apply changes
      shell: firewall-cmd --reload
      failed_when: false
      changed_when: false

    # ----------------------------------------------------------
    # 2. APPLICATION DEPLOYMENT (artifact-based)
    # ----------------------------------------------------------
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: deploy
        group: deploy
        mode: '0755'

    - name: Copy artifact from Jenkins
      copy:
        src: "{{ playbook_dir }}/../artifact/fundgaze.zip"
        dest: /tmp/fundgaze.zip

    - name: Remove previous deployment
      file:
        path: "{{ app_dir }}"
        state: absent

    - name: Recreate application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: deploy
        group: deploy

    - name: Extract application
      unarchive:
        src: /tmp/fundgaze.zip
        dest: "{{ app_dir }}"
        remote_src: yes

    - name: Create application .env file
      copy:
        dest: "{{ app_dir }}/.env"
        owner: deploy
        group: deploy
        mode: '0600'
        content: |
          NODE_ENV=production
          MONGO_DB_URL=mongodb://127.0.0.1:{{ mongo_port }}/{{ app_name }}
          SECRET_KEY={{ secret_key }}

    - name: Install Node.js dependencies
      command: npm ci --production
      args:
        chdir: "{{ app_dir }}"
      become_user: deploy

    # ----------------------------------------------------------
    # 3. PM2 START / RESTART
    # ----------------------------------------------------------
    - name: Stop old PM2 process
      shell: pm2 delete {{ app_name }}
      become_user: deploy
      failed_when: false

    - name: Start application with PM2
      shell: pm2 start index.js --name {{ app_name }}
      args:
        chdir: "{{ app_dir }}"
      become_user: deploy

    - name: Save PM2 process list
      shell: pm2 save
      become_user: deploy

    # ----------------------------------------------------------
    # 4. HTTPS REVERSE PROXY (Nginx, self-signed cert)
    # ----------------------------------------------------------
    - name: Ensure Nginx is installed
      dnf:
        name: nginx
        state: present

    - name: Ensure certificate directory exists
      file:
        path: "{{ cert_dir }}"
        state: directory
        mode: '0700'

    - name: Check if self-signed certificate already exists
      stat:
        path: "{{ cert_dir }}/fundgaze.crt"
      register: cert_check

    - name: Generate self-signed certificate (first run only)
      command: >
        openssl req -newkey rsa:4096 -nodes -sha256
        -keyout {{ cert_dir }}/fundgaze.key
        -x509 -days 3650
        -out {{ cert_dir }}/fundgaze.crt
        -subj "/CN={{ ansible_host }}"
        -addext "subjectAltName=IP:{{ ansible_host }}"
      when: not cert_check.stat.exists

    - name: Deploy Nginx TLS reverse proxy config
      template:
        src: templates/nginx-tls.conf.j2
        dest: /etc/nginx/conf.d/fundgaze.conf
        mode: '0644'
      notify: Reload nginx

    - name: Remove default Nginx welcome config (avoid conflicts)
      file:
        path: /etc/nginx/conf.d/default.conf
        state: absent
      failed_when: false

    - name: Enable and start Nginx
      systemd:
        name: nginx
        enabled: yes
        state: started

    - name: Open firewall ports 80 and 443
      shell: firewall-cmd --permanent --add-port={{ item }}/tcp
      loop:
        - "80"
        - "443"
      failed_when: false
      changed_when: false

    - name: Reload firewall after HTTPS port changes
      shell: firewall-cmd --reload
      failed_when: false
      changed_when: false

    # ----------------------------------------------------------
    # 5. VERIFY
    # ----------------------------------------------------------
    - name: Verify application is listening on port 8080
      wait_for:
        port: "{{ app_port }}"
        timeout: 60

    - name: Verify HTTPS endpoint responds
      uri:
        url: "https://{{ ansible_host }}"
        validate_certs: no
        status_code: [200, 301, 302, 404]
      register: https_check
      retries: 6
      delay: 5
      until: https_check.status is defined
      ignore_errors: yes

    - name: Show PM2 status
      shell: pm2 list
      become_user: deploy
      register: pm2_status

    - debug:
        var: pm2_status.stdout_lines

  handlers:
    - name: Reload nginx
      systemd:
        name: nginx
        state: reloaded