---
- name: Deploy FundGaze to Windows
  hosts: windows

  vars:
    app_name: fundgaze
    app_dir: C:\fundgaze
    mongo_host: 172.17.86.44
    mongo_port: 27017
    secret_key: "{{ secret_key | default('change_this_secret') }}"

  tasks:

    # ----------------------------------------------------------
    # 1. APPLICATION DEPLOYMENT (artifact-based)
    # ----------------------------------------------------------
    - name: Create deployment directory
      win_file:
        path: "{{ app_dir }}"
        state: directory

    - name: Copy artifact from Jenkins
      win_copy:
        src: ../artifact/fundgaze.zip
        dest: C:\Temp\fundgaze.zip

    - name: Remove old deployment
      win_file:
        path: "{{ app_dir }}"
        state: absent

    - name: Recreate deployment folder
      win_file:
        path: "{{ app_dir }}"
        state: directory

    - name: Extract artifact
      community.windows.win_unzip:
        src: C:\Temp\fundgaze.zip
        dest: "{{ app_dir }}"

    - name: Create .env file (connects to Linux MongoDB)
      win_copy:
        dest: "{{ app_dir }}\\.env"
        content: |
          NODE_ENV=production
          MONGO_DB_URL=mongodb://{{ mongo_host }}:{{ mongo_port }}/{{ app_name }}
          SECRET_KEY={{ secret_key }}

    - name: Install Node.js dependencies
      win_shell: |
        cd {{ app_dir }}
        npm ci --production

    # ----------------------------------------------------------
    # 2. PM2 START / RESTART
    # ----------------------------------------------------------
    - name: Stop existing PM2 process
      win_shell: pm2 delete {{ app_name }}
      ignore_errors: yes

    - name: Start application with PM2
      win_shell: |
        cd {{ app_dir }}
        pm2 start index.js --name {{ app_name }}

    - name: Save PM2 process list
      win_shell: pm2 save

    # ----------------------------------------------------------
    # 3. OPEN FIREWALL PORT
    # ----------------------------------------------------------
    - name: Allow port 8080 through Windows Firewall
      win_firewall_rule:
        name: "FundGaze App 8080"
        localport: 8080
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes

    # ----------------------------------------------------------
    # 4. VERIFY
    # ----------------------------------------------------------
    - name: Verify PM2 status
      win_shell: pm2 list
      register: pm2_status

    - debug:
        var: pm2_status.stdout_lines
