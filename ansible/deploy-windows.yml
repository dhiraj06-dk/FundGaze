---
# ================================================================
# Playbook: Deploy FundGaze to Windows
# Includes: app deployment + HTTPS reverse proxy (Nginx, self-signed)
# ================================================================

- name: Deploy FundGaze to Windows
  hosts: windows

  vars:
    app_name: fundgaze
    app_dir: C:\fundgaze
    temp_dir: C:\Temp
    app_port: 8080
    mongo_host: 172.17.86.44
    mongo_port: 27017
    secret_key: "{{ secret_key | default('change_this_secret') }}"
    nginx_dir: C:\nginx
    nginx_cert_dir: C:\nginx\certs

  tasks:

    # ----------------------------------------------------------
    # 1. APPLICATION DEPLOYMENT (artifact-based)
    # ----------------------------------------------------------
    - name: Ensure temp directory exists
      win_file:
        path: "{{ temp_dir }}"
        state: directory

    - name: Create deployment directory
      win_file:
        path: "{{ app_dir }}"
        state: directory

    - name: Copy artifact from Jenkins
      win_copy:
        src: "{{ playbook_dir }}/../artifact/fundgaze.zip"
        dest: "{{ temp_dir }}\\fundgaze.zip"

    - name: Stop existing PM2 process (release file locks before delete)
      win_shell: pm2 delete {{ app_name }}
      ignore_errors: yes
      changed_when: false

    - name: Remove old deployment
      win_file:
        path: "{{ app_dir }}"
        state: absent

    - name: Recreate deployment folder
      win_file:
        path: "{{ app_dir }}"
        state: directory

    - name: Extract artifact
      community.windows.win_unzip:
        src: "{{ temp_dir }}\\fundgaze.zip"
        dest: "{{ app_dir }}"

    - name: Create .env file (connects to Linux MongoDB)
      win_copy:
        dest: "{{ app_dir }}\\.env"
        content: |
          NODE_ENV=production
          MONGO_DB_URL=mongodb://{{ mongo_host }}:{{ mongo_port }}/{{ app_name }}
          SECRET_KEY={{ secret_key }}

    - name: Install Node.js dependencies
      win_shell: |
        cd {{ app_dir }}
        npm ci --production
      register: npm_install_result
      failed_when: npm_install_result.rc != 0

    # ----------------------------------------------------------
    # 2. PM2 START
    # ----------------------------------------------------------
    - name: Start application with PM2
      win_shell: |
        cd {{ app_dir }}
        pm2 start index.js --name {{ app_name }}

    # ----------------------------------------------------------
    # 3. NGINX + HTTPS REVERSE PROXY (Nginx for Windows, self-signed)
    # ----------------------------------------------------------
    - name: Check if Nginx for Windows is already installed
      win_stat:
        path: "{{ nginx_dir }}\\nginx.exe"
      register: nginx_check

    - name: Download Nginx for Windows (first run only)
      win_get_url:
        url: http://nginx.org/download/nginx-1.26.2.zip
        dest: "{{ temp_dir }}\\nginx.zip"
      when: not nginx_check.stat.exists

    - name: Extract Nginx (first run only)
      community.windows.win_unzip:
        src: "{{ temp_dir }}\\nginx.zip"
        dest: C:\
      when: not nginx_check.stat.exists

    - name: Rename extracted Nginx folder to C:\nginx (first run only)
      win_command: cmd /c rename "C:\nginx-1.26.2" "nginx"
      when: not nginx_check.stat.exists
      ignore_errors: yes

    - name: Ensure Nginx cert directory exists
      win_file:
        path: "{{ nginx_cert_dir }}"
        state: directory

    - name: Check if self-signed certificate already exists
      win_stat:
        path: "{{ nginx_cert_dir }}\\fundgaze.crt"
      register: cert_check

    - name: Generate self-signed certificate on Jenkins controller (no OpenSSL needed on Windows)
      command: >
        openssl req -newkey rsa:4096 -nodes -sha256
        -keyout /tmp/fundgaze-windows.key
        -x509 -days 3650
        -out /tmp/fundgaze-windows.crt
        -subj "/CN={{ ansible_host }}"
        -addext "subjectAltName=IP:{{ ansible_host }}"
      delegate_to: localhost
      when: not cert_check.stat.exists

    - name: Copy certificate to Windows VM
      win_copy:
        src: /tmp/fundgaze-windows.crt
        dest: "{{ nginx_cert_dir }}\\fundgaze.crt"
      when: not cert_check.stat.exists

    - name: Copy private key to Windows VM
      win_copy:
        src: /tmp/fundgaze-windows.key
        dest: "{{ nginx_cert_dir }}\\fundgaze.key"
      when: not cert_check.stat.exists

    - name: Remove temp cert files from Jenkins controller
      file:
        path: "{{ item }}"
        state: absent
      delegate_to: localhost
      loop:
        - /tmp/fundgaze-windows.key
        - /tmp/fundgaze-windows.crt
      when: not cert_check.stat.exists

    - name: Deploy Nginx TLS reverse proxy config
      win_template:
        src: templates/nginx-windows-tls.conf.j2
        dest: "{{ nginx_dir }}\\conf\\nginx.conf"

    - name: Stop existing Nginx PM2 process (if running, to reload config)
      win_shell: pm2 delete nginx-proxy
      ignore_errors: yes
      changed_when: false

    - name: Start Nginx under PM2
      win_shell: |
        cd {{ nginx_dir }}
        pm2 start nginx.exe --name nginx-proxy

    - name: Save PM2 process list (app + nginx)
      win_shell: pm2 save
      changed_when: false

    # ----------------------------------------------------------
    # 4. OPEN FIREWALL PORTS
    # ----------------------------------------------------------
    - name: Allow port 8080 through Windows Firewall (internal use)
      win_firewall_rule:
        name: "FundGaze App 8080"
        localport: 8080
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes

    - name: Allow port 443 through Windows Firewall (HTTPS)
      win_firewall_rule:
        name: "FundGaze HTTPS 443"
        localport: 443
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes

    - name: Allow port 80 through Windows Firewall (HTTP redirect)
      win_firewall_rule:
        name: "FundGaze HTTP 80"
        localport: 80
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes

    # ----------------------------------------------------------
    # 5. VERIFY
    # ----------------------------------------------------------
    - name: Wait for application to respond on port 8080
      win_uri:
        url: "http://localhost:8080"
        status_code: [200, 301, 302, 404]
        timeout: 10
      register: health_check
      retries: 10
      delay: 5
      until: health_check.status_code is defined
      ignore_errors: yes

    - name: Verify HTTPS endpoint responds
      win_uri:
        url: "https://localhost"
        validate_certs: no
        status_code: [200, 301, 302, 404]
        timeout: 10
      register: https_check
      retries: 6
      delay: 5
      until: https_check.status_code is defined
      ignore_errors: yes

    - name: Verify PM2 status
      win_shell: pm2 list
      register: pm2_status
      changed_when: false

    - debug:
        var: pm2_status.stdout_lines

    - name: Cleanup temp artifact
      win_file:
        path: "{{ temp_dir }}\\fundgaze.zip"
        state: absent